<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仓储管理部 FY26 学习计划</title>
<style>
:root{
  --accent:#5b21b6; --accent-l:#ede9fe; --accent-m:#c4b5fd;
  --green:#047857;  --green-l:#d1fae5;  --green-m:#6ee7b7;
  --blue:#1e40af;   --blue-l:#dbeafe;
  --orange:#b45309; --orange-l:#fef3c7;
  --red:#dc2626;
  --t1:#111827; --t2:#6b7280; --t3:#9ca3af;
  --border:#e5e7eb; --bg:#f5f6fa; --card:#ffffff;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.04);
  /* legacy aliases so JS-generated class refs still work */
  --purple:var(--accent); --purple-d:var(--accent);
  --glass-border:var(--border); --glass-bg:var(--card);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;
  background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;
}

/* background blobs hidden in minimal theme */
.bg{display:none;}

/* flatten glass helpers */
.glass{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);}
.glass2{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);}

.page{position:relative;}

/* ── Hero ── */
.hero{
  padding:32px 52px 24px;
  border-bottom:1px solid var(--border);
  background:#fff;
}
.dept-name{
  font-size:13px;font-weight:600;letter-spacing:.8px;
  color:var(--t2);margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
  text-transform:uppercase;
}
.dept-name::before{
  content:'';width:3px;height:14px;border-radius:2px;
  background:var(--accent);flex-shrink:0;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{
  font-size:28px;font-weight:800;letter-spacing:-.3px;line-height:1.2;
  color:var(--t1);
}
.hero-meta{margin-top:10px;display:flex;gap:20px;font-size:12px;color:var(--t2);}
.hero-meta span{display:flex;align-items:center;gap:5px;}
.hero-date{margin-left:auto;text-align:right;font-size:11px;color:var(--t3);}
.hero-date b{display:block;color:var(--t2);font-size:12px;margin-bottom:2px;}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px 52px;}
.sc{
  border-radius:10px;padding:18px 20px;
  background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);
}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sc-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:18px;}
.sc.p .sc-ico{background:var(--accent-l);}
.sc.g .sc-ico{background:var(--green-l);}
.sc.o .sc-ico{background:var(--orange-l);}
.sc.b .sc-ico{background:var(--blue-l);}
.sc-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;}
.sc.p .sc-tag{background:var(--accent-l);color:var(--accent);}
.sc.g .sc-tag{background:var(--green-l);color:var(--green);}
.sc.o .sc-tag{background:var(--orange-l);color:var(--orange);}
.sc.b .sc-tag{background:var(--blue-l);color:var(--blue);}
.sc-num{font-size:32px;font-weight:800;line-height:1;display:flex;align-items:baseline;gap:3px;}
.sc-num .u{font-size:13px;font-weight:400;color:var(--t2);}
.sc-lbl{font-size:11px;color:var(--t2);margin-top:4px;}

/* ── Section label ── */
.sec{padding:4px 52px 12px;display:flex;align-items:center;gap:14px;}
.sec h3{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;}
.sec-line{flex:1;height:1px;background:var(--border);}

/* ── Gantt ── */
.gantt-wrap{padding:0 52px 24px;}
.gantt{border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#fff;}
.g-head{display:grid;grid-template-columns:190px repeat(12,1fr);
  background:#f9fafb;border-bottom:1px solid var(--border);}
.g-head-lbl{padding:10px 16px;font-size:10px;font-weight:700;color:var(--t3);
  letter-spacing:.8px;text-transform:uppercase;border-right:1px solid var(--border);}
.g-head-m{padding:10px 2px;font-size:11px;font-weight:500;color:var(--t2);
  text-align:center;border-right:1px solid #f0f0f0;}
.g-ms-row{display:grid;grid-template-columns:190px repeat(12,1fr);
  border-bottom:1px solid var(--border);background:#fffbeb;}
.g-ms-lbl{padding:6px 16px;font-size:10px;font-weight:700;color:var(--orange);
  border-right:1px solid var(--border);display:flex;align-items:center;gap:5px;}
.g-ms-cell{position:relative;border-right:1px solid #f0f0f0;
  display:flex;align-items:center;justify-content:center;min-height:28px;}
.ms-pin{
  font-size:10px;font-weight:600;color:var(--orange);
  background:#fef3c7;border:1px solid #fde68a;
  padding:2px 7px;border-radius:5px;white-space:nowrap;
}
.g-row{display:grid;grid-template-columns:190px repeat(12,1fr);
  border-bottom:1px solid #f3f4f6;
  transition:background .15s;cursor:pointer;}
.g-row:last-child{border-bottom:none;}
.g-row:hover{background:#fafafa;}
.g-lbl{padding:9px 14px;font-size:12px;font-weight:500;color:var(--t1);
  border-right:1px solid var(--border);
  display:flex;align-items:center;gap:7px;overflow:hidden;}
.g-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.g-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.g-cell{border-right:1px solid #f0f0f0;padding:5px 1px;display:flex;align-items:center;}
.g-bar{height:20px;width:100%;border-radius:3px;}
.g-bar.p{background:#ddd6fe;}
.g-bar.g{background:#a7f3d0;}
.g-bar.b{background:#bfdbfe;}
.g-bar.dash{
  background:repeating-linear-gradient(90deg,
    #c4b5fd 0,#c4b5fd 5px,#ede9fe 5px,#ede9fe 10px);
}
.g-bar.rs{border-radius:3px 0 0 3px;} .g-bar.re{border-radius:0 3px 3px 0;} .g-bar.rm{border-radius:0;}

/* ── Cards ── */
.cards-wrap{padding:0 52px 50px;display:flex;flex-direction:column;gap:24px;}
.cat-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.cat-stripe{width:3px;height:18px;border-radius:2px;}
.cat-stripe.p{background:var(--accent);}
.cat-stripe.g{background:var(--green);}
.cat-name{font-size:15px;font-weight:700;color:var(--t1);}
.cat-cnt{font-size:11px;color:var(--t3);
  background:#f3f4f6;border:1px solid var(--border);
  padding:2px 8px;border-radius:8px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;}
.card{
  border-radius:10px;padding:18px 20px;cursor:pointer;
  background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);
  transition:border-color .2s,box-shadow .2s;
}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.card-p:hover{border-color:var(--accent-m);}
.card-g:hover{border-color:var(--green-m);}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.card-ico{width:40px;height:40px;border-radius:10px;font-size:20px;
  display:flex;align-items:center;justify-content:center;background:#f3f4f6;}
.sbadge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;
  display:flex;align-items:center;gap:4px;}
.sbadge.done   {background:var(--green-l);color:var(--green);}
.sbadge.ongoing{background:var(--orange-l);color:var(--orange);}
.sbadge.pending{background:var(--blue-l);color:var(--blue);}
.sbadge::before{content:'';width:5px;height:5px;border-radius:50%;}
.sbadge.done::before   {background:var(--green);}
.sbadge.ongoing::before{background:var(--orange);animation:blink 2s infinite;}
.sbadge.pending::before{background:var(--blue);}

/* ── Year switcher ── */
.yr-switch{
  display:inline-flex;gap:0;margin-top:12px;
  background:#f3f4f6;border:1px solid var(--border);
  border-radius:8px;padding:3px;
}
.yr-btn{
  padding:5px 18px;border-radius:6px;font-size:12px;font-weight:600;
  color:var(--t2);cursor:pointer;transition:all .18s;letter-spacing:.5px;
  user-select:none;
}
.yr-btn.on{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.card-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:5px;line-height:1.4;}
.card-desc{font-size:12px;color:var(--t2);line-height:1.75;}
.card-foot{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500;}
.tag.tp{background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd;}
.tag.tf{background:#faf5ff;color:#7c3aed;border:1px solid #e9d5ff;}
.tag.to{background:#fffbeb;color:#b45309;border:1px solid #fde68a;}
.tag.tm{background:#fffbeb;color:#b45309;border:1px solid #fde68a;}

/* SVG ring */
.ring{transform:rotate(-90deg);}
.rb{fill:none;stroke:#e5e7eb;stroke-width:3.5;}
.rf{fill:none;stroke-width:3.5;stroke-linecap:round;transition:stroke-dashoffset 1.3s ease;}
.rf.p{stroke:#7c3aed;}  .rf.g{stroke:#059669;}
.rt{font-size:9.5px;font-weight:800;fill:var(--t2);dominant-baseline:middle;text-anchor:middle;}

/* ── Side panel ── */
.overlay{
  visibility:hidden;opacity:0;
  transition:opacity .3s,visibility .3s;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.2);
  z-index:300;
}
.overlay.on{visibility:visible;opacity:1;}
.panel{
  position:absolute;top:0;right:0;bottom:0;width:500px;
  background:#fff;
  border-left:1px solid var(--border);
  box-shadow:-6px 0 24px rgba(0,0,0,0.08);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.overlay.on .panel{transform:translateX(0);}

/* ── Preview pane ── */
.preview-pane{
  position:absolute;inset:0;
  background:#fff;
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  z-index:20;
}
.preview-pane.on{transform:translateX(0);}
.preview-head{
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);flex-shrink:0;
  background:#fff;
}
.preview-back{
  background:#f3f4f6;border:1px solid var(--border);
  color:var(--t2);font-size:12px;padding:5px 12px;border-radius:7px;
  cursor:pointer;transition:all .2s;flex-shrink:0;
}
.preview-back:hover{background:#e5e7eb;color:var(--t1);}
.preview-name{flex:1;font-size:13px;font-weight:600;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.preview-dl{
  background:var(--accent-l);border:1px solid var(--accent-m);
  color:var(--accent);font-size:11px;font-weight:600;
  padding:5px 12px;border-radius:7px;text-decoration:none;
  transition:all .2s;flex-shrink:0;white-space:nowrap;
}
.preview-dl:hover{background:#ddd6fe;}
.preview-body{flex:1;overflow:hidden;background:#f9fafb;}
.preview-body iframe{width:100%;height:100%;border:none;display:block;}
.preview-body video{width:100%;height:100%;background:#111;display:block;object-fit:contain;}

/* panel header */
.ph{
  padding:24px 24px 18px;border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;
}
.ph-cat{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.ph-cat.p{color:var(--accent);}  .ph-cat.g{color:var(--green);}
.ph h2{font-size:18px;font-weight:700;color:var(--t1);line-height:1.3;margin-bottom:6px;}
.ph-desc{font-size:12px;color:var(--t2);line-height:1.75;}
.ph-close{
  position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:7px;
  background:#f3f4f6;border:1px solid var(--border);
  color:var(--t2);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.ph-close:hover{background:#e5e7eb;color:var(--t1);}

.pp{padding:12px 24px;border-bottom:1px solid var(--border);flex-shrink:0;}
.pp-top{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:6px;}
.pp-bar{height:3px;background:#f0f0f0;border-radius:2px;}
.pp-fill{height:3px;border-radius:2px;transition:width 1.1s ease;}
.pp-fill.p{background:var(--accent);}
.pp-fill.g{background:var(--green);}

.ptabs{display:flex;padding:0 24px;border-bottom:1px solid var(--border);flex-shrink:0;}
.ptab{
  padding:12px 0;margin-right:20px;font-size:13px;font-weight:500;color:var(--t3);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;
  display:flex;align-items:center;gap:6px;
}
.ptab.on{color:var(--t1);border-bottom-color:var(--accent);}
.cbub{font-size:10px;background:var(--accent-l);color:var(--accent);
  padding:1px 5px;border-radius:6px;}

.pbody{flex:1;overflow-y:auto;padding:16px 24px;}
.pbody::-webkit-scrollbar{width:3px;}
.pbody::-webkit-scrollbar-track{background:transparent;}
.pbody::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px;}
.tp{display:none;} .tp.on{display:block;}

/* doc items */
.di{
  display:flex;align-items:center;gap:12px;padding:12px;
  border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .2s;
  border:1px solid var(--border);
}
.di:hover{background:#fafafa;border-color:var(--accent-m);}
.di-ico{width:38px;height:44px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.di-ico.pdf  {background:#fee2e2;}
.di-ico.ppt  {background:#fef3c7;}
.di-ico.word {background:#dbeafe;}
.di-ico.excel{background:#d1fae5;}
.di-ico.html {background:#ede9fe;}
.di-ico.other{background:#f3f4f6;}
.di-info{flex:1;min-width:0;}
.di-name{font-size:13px;font-weight:600;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.di-meta{font-size:11px;color:var(--t3);}
.di-btn{
  flex-shrink:0;font-size:11px;font-weight:600;
  color:var(--accent);background:var(--accent-l);
  border:1px solid var(--accent-m);padding:5px 10px;border-radius:6px;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.di-btn:hover{background:#ddd6fe;}

/* video items */
.vi{
  display:flex;align-items:center;gap:12px;padding:12px;
  border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .2s;
  border:1px solid var(--border);
}
.vi:hover{background:#fafafa;border-color:var(--green-m);}
.vi-thumb{width:84px;height:50px;border-radius:7px;background:#f3f4f6;
  flex-shrink:0;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;}
.vi-thumb img{width:100%;height:100%;object-fit:cover;}
.play{position:absolute;width:26px;height:26px;background:rgba(0,0,0,.5);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#fff;transition:transform .2s;}
.vi:hover .play{transform:scale(1.12);}
.vi-info{flex:1;min-width:0;}
.vi-name{font-size:13px;font-weight:600;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.vi-meta{font-size:11px;color:var(--t3);}

/* empty */
.empty{display:flex;flex-direction:column;align-items:center;padding:40px 20px;color:var(--t3);}
.empty-ico{width:52px;height:52px;border-radius:12px;background:#f3f4f6;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;margin-bottom:12px;}
.empty h4{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:5px;}
.empty p{font-size:12px;text-align:center;line-height:1.7;}
.empty-btn{
  margin-top:14px;padding:7px 18px;
  background:var(--accent-l);border:1px solid var(--accent-m);
  color:var(--accent);border-radius:7px;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.empty-btn:hover{background:#ddd6fe;}
</style>
</head>
<body>

<!-- SVG gradients for ring strokes -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="gp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
</svg>

<div class="bg">
  <div class="bg-grad"></div>
  <div class="bg-blob bl1"></div>
  <div class="bg-blob bl2"></div>
  <div class="bg-blob bl3"></div>
  <div class="bg-blob bl4"></div>
</div>

<div class="page">

<!-- HERO -->
<div class="hero">
  <div style="display:flex;align-items:flex-start;justify-content:space-between">
    <div>
      <div class="dept-name">仓储管理部</div>
      <h1>学习计划全景</h1>
      <div class="yr-switch">
        <div class="yr-btn on" data-yr="FY26" onclick="switchYear('FY26')">FY26</div>
        <div class="yr-btn" data-yr="FY27" onclick="switchYear('FY27')">FY27</div>
      </div>
      <div class="hero-meta">
        <span id="hm-range">📅 2025年3月 – 2026年2月</span>
        <span>👥 仓储管理部全员</span>
        <span id="hm-total">🎯 9 项学习活动</span>
      </div>
    </div>
    <div class="hero-date">最近更新<br><b>2026-04-09</b></div>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="sc glass p">
    <div class="sc-top">
      <div class="sc-ico">📋</div>
      <div class="sc-tag">覆盖全年</div>
    </div>
    <div class="sc-num"><span class="cnum" id="st-total" data-t="9">0</span><span class="u">项</span></div>
    <div class="sc-lbl">全年学习活动总计</div>
  </div>
  <div class="sc glass g">
    <div class="sc-top">
      <div class="sc-ico">✅</div>
      <div class="sc-tag">超预期 ↑</div>
    </div>
    <div class="sc-num"><span class="cnum" id="st-done" data-t="7">0</span><span class="u">项</span></div>
    <div class="sc-lbl" id="lbl-done">已顺利完成</div>
  </div>
  <div class="sc glass o">
    <div class="sc-top">
      <div class="sc-ico">⚡</div>
      <div class="sc-tag">积极推进</div>
    </div>
    <div class="sc-num"><span class="cnum" id="st-ongoing" data-t="2">0</span><span class="u">项</span></div>
    <div class="sc-lbl" id="lbl-ongoing">当前持续推进中</div>
  </div>
  <div class="sc glass b">
    <div class="sc-top">
      <div class="sc-ico">📈</div>
      <div class="sc-tag">良好 ↑</div>
    </div>
    <div class="sc-num"><span class="cnum" id="st-rate" data-t="88">0</span><span class="u">%</span></div>
    <div class="sc-lbl">整体目标完成率</div>
  </div>
</div>

<!-- GANTT -->
<div class="sec"><div class="sec-line"></div><h3>全年时间轴</h3><div class="sec-line"></div></div>
<div class="gantt-wrap">
  <div class="gantt glass">
    <div class="g-head">
      <div class="g-head-lbl">学习活动</div>
      <div class="g-head-m">3月</div><div class="g-head-m">4月</div>
      <div class="g-head-m">5月</div><div class="g-head-m">6月</div>
      <div class="g-head-m">7月</div><div class="g-head-m">8月</div>
      <div class="g-head-m">9月</div><div class="g-head-m">10月</div>
      <div class="g-head-m">11月</div><div class="g-head-m">12月</div>

function switchYear(yr){
  if(CUR_YR===yr)return;
  CUR_YR=yr;
  D=yr==='FY26'?D_FY26:D_FY27;
  MS=yr==='FY26'?MS_FY26:MS_FY27;
  document.querySelectorAll('.yr-btn').forEach(function(b){
    b.classList.toggle('on',b.dataset.yr===yr);
  });
  var m=YR_META[yr];
  document.getElementById('hm-range').textContent='📅 '+m.range;
  document.getElementById('hm-total').textContent='🎯 '+m.total+' 项学习活动';
  var ids=['st-total','st-done','st-ongoing','st-rate'];
  var vals=[m.total,m.done,m.ongoing,m.rate];
  ids.forEach(function(id,i){
    var el=document.getElementById(id);
    if(el){el.dataset.t=vals[i];el.textContent='0';}
  });
  countUp();
  document.getElementById('gbody').innerHTML='';
  document.getElementById('ms-row').innerHTML='<div class="g-ms-lbl">🏆 里程碑</div>';

function buildGantt(){
  var mr=document.getElementById('ms-row');
  for(var i=0;i<12;i++){
    var mc=document.createElement('div'); mc.className='g-ms-cell';
    var f=MS.find(function(x){return x.m===i;});
    if(f){var p=document.createElement('div');p.className='ms-pin';p.textContent=f.label;mc.appendChild(p);}
    mr.appendChild(mc);
  }
  var gb=document.getElementById('gbody');
  D.forEach(function(item){
    var row=document.createElement('div'); row.className='g-row';
    row.onclick=function(){openPanel(item.id);};
    var lbl=document.createElement('div'); lbl.className='g-lbl';
    var dot=document.createElement('span'); dot.className='g-dot';
    dot.style.background=item.cc==='p'?'#a78bfa':'#34d399';
    lbl.appendChild(dot);
    var t=document.createElement('span'); t.className='g-txt'; t.textContent=item.title;
    lbl.appendChild(t); row.appendChild(lbl);
    for(var ci=0;ci<12;ci++){
      var cell=document.createElement('div'); cell.className='g-cell';
      item.bars.forEach(function(b){
        if(ci>=b.s&&ci<=b.e){
          var bar=document.createElement('div');
          var rs=ci===b.s,re=ci===b.e;
          bar.className='g-bar '+b.c+(b.dash?' dash':'')+(rs&&re?'':rs?' rs':re?' re':' rm');
          cell.appendChild(bar);
        }
      });
      row.appendChild(cell);
    }
    gb.appendChild(row);
  });
}

function ring(pct,cc){
  var r=16,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  return '<svg class="ring" width="40" height="40">'
    +'<circle class="rb" cx="20" cy="20" r="'+r+'"/>'
    +'<circle class="rf '+cc+'" cx="20" cy="20" r="'+r+'"'
    +' stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'"/>'
    +'<text class="rt" x="20" y="20">'+pct+'%</text>'
    +'</svg>';
}
function buildCards(){
  var gs=document.getElementById('g-study'),gp=document.getElementById('g-prac');
  D.forEach(function(item){
    var th=item.tags.map(function(t){
      var c=t.match(/进行|实时|持续|滚动/)?'to':t.match(/节点|里程|交流会/)?'tm':t.match(/\d{4}/)?'tp':'tf';
      return '<span class="tag '+c+'">'+t+'</span>';
    }).join('');
    var d=document.createElement('div');
    d.className='card glass card-'+item.cc;
    d.innerHTML=
      '<div class="card-head">'
      +'<div class="card-ico">'+item.icon+'</div>'
      +'<div class="sbadge '+item.status+'">'+SLB[item.status]+'</div>'
      +'</div>'
      +'<div class="card-title">'+item.title+'</div>'
      +'<div class="card-desc">'+item.desc+'</div>'
      +'<div class="card-foot">'
      +'<div class="tags">'+th+'</div>'
      +'</div>';
    d.onclick=function(){openPanel(item.id);};
    (item.cat==='学习计划'?gs:gp).appendChild(d);
  });
}

function openPanel(id){
  var item=D.find(function(x){return x.id===id;});
  if(!item)return;
  document.getElementById('p-cat').textContent=item.cat;
  document.getElementById('p-cat').className='ph-cat '+item.cc;
  document.getElementById('p-title').textContent=item.title;
  document.getElementById('p-desc').textContent=item.desc;
  document.getElementById('p-pct').textContent=item.pct+'%';
  var f=document.getElementById('p-fill');
  f.className='pp-fill '+item.cc; f.style.width='0';
  setTimeout(function(){f.style.width=item.pct+'%';},60);
  document.getElementById('dcnt').textContent=item.docs.length;
  document.getElementById('vcnt').textContent=item.videos.length;
  var dl=document.getElementById('dl'); dl.innerHTML='';
  if(item.docs.length){
    item.docs.forEach(function(doc){
      var tp=doc.type||'other';
      var el=document.createElement('div');
      el.className='di glass';
      el.innerHTML='<div class="di-ico '+tp+'">'+(DICO[tp]||'📄')+'</div>'
        +'<div class="di-info"><div class="di-name">'+doc.name+'</div>'
        +'<div class="di-meta">'+(doc.date||'')+'</div></div>'
        +'<span style="font-size:11px;color:var(--purple);font-weight:600;">预览 →</span>';
      el.onclick=function(){openDoc(doc);};
      dl.appendChild(el);
    });
  }else{
    dl.innerHTML=mkEmpty('📂','暂无文档总结','将该活动的总结、PPT 或报告上传后即可在此查阅');
  }
  var vl=document.getElementById('vl'); vl.innerHTML='';
  if(item.videos.length){
    item.videos.forEach(function(v){
      var el=document.createElement('div');
      el.className='vi glass';
      el.innerHTML='<div class="vi-thumb">'+(v.thumb?'<img src="'+v.thumb+'">':'')
        +'<div class="play">▶</div></div>'
        +'<div class="vi-info"><div class="vi-name">'+v.name+'</div>'
        +'<div class="vi-meta">'+(v.duration||'')+(v.date?' · '+v.date:'')+'</div></div>';
      el.onclick=function(){if(v.url)openVideo(v);};
      vl.appendChild(el);
    });
  }else{
    vl.innerHTML=mkEmpty('🎬','暂无视频记录','将课程录像或参观视频链接添加到此处');
  }
  switchTab('docs',document.querySelector('.ptab'));
  document.getElementById('ov').classList.add('on');
}
function mkEmpty(ico,title,hint){
  return '<div class="empty"><div class="empty-ico glass">'+ico+'</div>'
    +'<h4>'+title+'</h4><p>'+hint+'</p></div>';
}
var BASE_URL='https://xue11-sir.github.io/-/';
function openDoc(doc){
  var full=BASE_URL+doc.url;
  var ext=doc.url.split('.').pop().toLowerCase();
  var src=(ext==='pdf'||ext==='html'||ext==='htm')?full:'https://view.officeapps.live.com/op/view.aspx?src='+encodeURIComponent(full);
  document.getElementById('preview-name').textContent=doc.name;
  document.getElementById('preview-dl').href=doc.url;
  document.getElementById('preview-dl').setAttribute('download',doc.name);
  document.getElementById('preview-body').innerHTML='<iframe src="'+src+'"></iframe>';
  document.getElementById('preview-pane').classList.add('on');
}
function openVideo(v){
  document.getElementById('preview-name').textContent=v.name;
  document.getElementById('preview-dl').href=v.url;
  document.getElementById('preview-dl').setAttribute('download',v.name);
  document.getElementById('preview-body').innerHTML='<video src="'+v.url+'" controls autoplay></video>';
  document.getElementById('preview-pane').classList.add('on');
}
function closePreview(){
  document.getElementById('preview-pane').classList.remove('on');
  setTimeout(function(){document.getElementById('preview-body').innerHTML='';},320);
}
function closePanel(){
  document.getElementById('preview-pane').classList.remove('on');
  document.getElementById('preview-body').innerHTML='';
  document.getElementById('ov').classList.remove('on');
  setTimeout(function(){document.getElementById('p-fill').style.width='0';},400);
}
function closeOuter(e){if(e.target===document.getElementById('ov'))closePanel();}
function switchTab(n,el){
  document.querySelectorAll('.ptab').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.tp').forEach(function(p){p.classList.remove('on');});
  if(el)el.classList.add('on');
  var tp=document.getElementById('tp-'+n); if(tp)tp.classList.add('on');
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePanel();});
function countUp(){
  document.querySelectorAll('.cnum').forEach(function(el){
    var tgt=+el.dataset.t,t0=performance.now();
    (function tick(now){
      var p=Math.min((now-t0)/1100,1);
      el.textContent=Math.round((1-Math.pow(1-p,3))*tgt);
      if(p<1)requestAnimationFrame(tick);
    })(t0);
  });
}
buildGantt(); buildCards(); setTimeout(countUp,400);
